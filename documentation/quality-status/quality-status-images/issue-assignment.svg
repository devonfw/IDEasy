<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" role="img">
<style>
  :root {
    color-scheme: light dark;
    --chart-background: #ffffff;
    --chart-text: #24292f;
    --chart-muted-text: #57606a;
    --chart-bar-track: #f0f3f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --chart-background: #0d1117;
      --chart-text: #f0f6fc;
      --chart-muted-text: #8b949e;
      --chart-bar-track: #30363d;
    }
  }
</style>
<rect width="640" height="300" rx="12" fill="var(--chart-background)"/>
<title>Assigned vs unassigned issues</title>
<text x="24" y="34" fill="var(--chart-text)" font-family="sans-serif" font-size="20" font-weight="600">Assigned vs unassigned issues</text>
<path d="M 170.0 164.0 L 170.0 64.0 A 100.0 100.0 0 0 1 230.0 244.0 Z" fill="#0969da"/>
<rect x="330" y="66" width="14" height="14" rx="2" fill="#0969da"/>
<text x="354" y="78" fill="var(--chart-text)" font-family="sans-serif" font-size="13">Assigned: 66 (39.8%)</text>
<path d="M 170.0 164.0 L 230.0 244.0 A 100.0 100.0 0 1 1 170.0 64.0 Z" fill="#1f883d"/>
<rect x="330" y="96" width="14" height="14" rx="2" fill="#1f883d"/>
<text x="354" y="108" fill="var(--chart-text)" font-family="sans-serif" font-size="13">Unassigned: 100 (60.2%)</text>
<circle cx="170.0" cy="164.0" r="50" fill="var(--chart-background)"/>
<text x="170.0" y="162.0" text-anchor="middle" fill="var(--chart-text)" font-family="sans-serif" font-size="24" font-weight="600">166</text>
<text x="170.0" y="184.0" text-anchor="middle" fill="var(--chart-muted-text)" font-family="sans-serif" font-size="12">total</text>
</svg>
