    :root {
      --chart-background: #0d1117;
      --chart-text: #f0f6fc;
      --chart-muted-text: #8b949e;
      --chart-bar-track: #30363d;
    }
  }
</style>
<rect width="640" height="300" rx="12" fill="var(--chart-background)"/>
<title>Issue age</title>
