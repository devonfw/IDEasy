name: Update quality status documents

on:
  push:
    branches:
      - feature/1978-improve-status-documentation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quality-status:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate status documents
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python documentation/generate_quality_status.py --output documentation/quality-status.adoc

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add documentation/quality-status*.adoc

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update quality status documents"
          git push
