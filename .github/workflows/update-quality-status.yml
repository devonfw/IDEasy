name: Update quality status documents

on:
  push:
    branches:
      - feature/1978-improve-status-documentation
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  update-quality-status:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate status documents
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove old generated status documents from the documentation root.
          # The new generated files will be written to documentation/status/.
          rm -f documentation/quality-status*.adoc
          rm -f documentation/status/quality-status*.adoc
          

          python documentation/generate_quality_status.py \
            --output documentation/quality-status/quality-status.adoc

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage all documentation changes, including deleted old files.
          git add -A documentation

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update quality status documents"
          git push
